<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 大脑轮廓 -->
  <g transform="translate(256,256) scale(1.2)" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- 左脑 -->
    <path d="M-60,-100 Q-100,-100 -120,-60 Q-140,-20 -120,20 Q-110,40 -100,60 Q-90,80 -60,80" />
    <!-- 右脑 -->
    <path d="M60,-100 Q100,-100 120,-60 Q140,-20 120,20 Q110,40 100,60 Q90,80 60,80" />
    <!-- 底部连接 -->
    <path d="M-60,80 Q-30,110 0,110 Q30,110 60,80" />
    <!-- 中间沟回 -->
    <path d="M-60,-100 Q-30,-130 0,-120 Q30,-130 60,-100" />
    <!-- 左脑纹路 -->
    <path d="M-100,-40 Q-70,-30 -40,-40" stroke-width="10" opacity="0.7"/>
    <path d="M-105,10 Q-75,20 -45,10" stroke-width="10" opacity="0.7"/>
    <path d="M-90,50 Q-65,60 -40,50" stroke-width="10" opacity="0.7"/>
    <!-- 右脑纹路 -->
    <path d="M100,-40 Q70,-30 40,-40" stroke-width="10" opacity="0.7"/>
    <path d="M105,10 Q75,20 45,10" stroke-width="10" opacity="0.7"/>
    <path d="M90,50 Q65,60 40,50" stroke-width="10" opacity="0.7"/>
    <!-- 闪电符号（代表反应力） -->
    <path d="M0,-70 L-12,-25 L8,-25 L-5,25" stroke-width="14" fill="none"/>
  </g>
</svg>
